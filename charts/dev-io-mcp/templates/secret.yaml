{{- if and .Values.remote.enabled .Values.remote.createSecret }}
{{- if not .Values.remote.apiToken }}
{{- fail "remote.apiToken is required when remote.createSecret=true" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "dev-io-mcp.fullname" . }}-remote
  labels:
    {{- include "dev-io-mcp.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.remote.existingSecretKey | quote }}: {{ .Values.remote.apiToken | quote }}
{{- end }}
