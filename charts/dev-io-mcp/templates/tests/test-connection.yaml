apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "dev-io-mcp.fullname" . }}-test-connection"
  labels:
    {{- include "dev-io-mcp.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: wget
      image: busybox:1.36
      command:
        - wget
      args:
        - --spider
        - --timeout=5
        - "http://{{ include "dev-io-mcp.fullname" . }}:{{ .Values.service.port }}/healthz"
