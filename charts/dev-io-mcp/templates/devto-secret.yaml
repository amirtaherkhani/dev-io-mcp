{{- if and .Values.devTo.publish .Values.devTo.createSecret }}
{{- if not .Values.devTo.apiKey }}
{{- fail "devTo.apiKey is required when devTo.createSecret=true" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "dev-io-mcp.fullname" . }}-devto
  labels:
    {{- include "dev-io-mcp.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.devTo.existingSecretKey | quote }}: {{ .Values.devTo.apiKey | quote }}
{{- end }}
