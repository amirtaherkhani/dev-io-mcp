apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dev-io-mcp-posts
  labels:
    app.kubernetes.io/name: dev-io-mcp
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dev-io-mcp-data
  labels:
    app.kubernetes.io/name: dev-io-mcp
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
