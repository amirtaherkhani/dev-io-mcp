apiVersion: apps/v1
kind: Deployment
metadata:
  name: dev-io-mcp
  labels:
    app.kubernetes.io/name: dev-io-mcp
    app.kubernetes.io/component: mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dev-io-mcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dev-io-mcp
        app.kubernetes.io/component: mcp-server
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: dev-io-mcp
          image: dev-io-mcp:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000
          env:
            - name: NODE_ENV
              value: production
            - name: MCP_TRANSPORT
              value: http
            - name: MCP_HOST
              value: 0.0.0.0
            - name: MCP_PORT
              value: "3000"
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: posts
              mountPath: /app/posts
            - name: data
              mountPath: /app/data
      volumes:
        - name: posts
          persistentVolumeClaim:
            claimName: dev-io-mcp-posts
        - name: data
          persistentVolumeClaim:
            claimName: dev-io-mcp-data
