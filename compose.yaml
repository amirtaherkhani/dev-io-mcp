services:
  dev-io-mcp:
    build:
      context: .
    image: dev-io-mcp:local
    environment:
      MCP_TRANSPORT: http
      MCP_HOST: 0.0.0.0
      MCP_PORT: 3000
      DEV_IO_API_BASE_URL: ${DEV_IO_API_BASE_URL:-}
      DEV_IO_API_TOKEN: ${DEV_IO_API_TOKEN:-}
      DEV_TO_PUBLISH: ${DEV_TO_PUBLISH:-false}
      DEV_TO_API_BASE_URL: ${DEV_TO_API_BASE_URL:-https://dev.to}
      DEV_TO_API_KEY: ${DEV_TO_API_KEY:-}
      DEV_TO_PUBLISHED: ${DEV_TO_PUBLISHED:-true}
      DEV_TO_USER_AGENT: ${DEV_TO_USER_AGENT:-dev-io-mcp/0.1.0}
    ports:
      - "3000:3000"
    volumes:
      - ./posts:/app/posts
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/readyz').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
